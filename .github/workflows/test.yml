name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install ShellCheck on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run tests
        run: make test
