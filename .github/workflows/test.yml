name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install ShellCheck on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run tests
        run: make test

      - name: Validate Docker Engine metadata routing
        if: runner.os == 'Linux'
        run: ./tests/container-runtime-linux.sh
