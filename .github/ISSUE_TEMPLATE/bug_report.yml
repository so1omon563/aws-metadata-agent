name: Bug Report
description: Report a reproducible problem with aws-metadata-agent.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include AWS credentials, account
        IDs, profile names, identity output, or other sensitive values.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched the existing issues and did not find this problem.
          required: true
        - label: I removed credentials and organization-specific information from this report.
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Other or unknown
    validations:
      required: true

  - type: input
    id: platform-version
    attributes:
      label: Platform version and architecture
      placeholder: "Example: macOS 15.5 on Apple Silicon"
    validations:
      required: true

  - type: input
    id: aws-runas-version
    attributes:
      label: aws-runas version
      placeholder: "Example: 3.9.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Describe what failed and when it started.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command sequence and whether this was a clean install, upgrade, reboot, or uninstall.
      placeholder: |
        1. Run `./bootstrap.sh`
        2. Run `./install.sh`
        3. Run `aws-metadata status --json`
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact errors after redacting sensitive information.
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Paste relevant `aws-metadata diagnose` output and service logs with usernames, paths, profiles, accounts, and identities redacted.
      render: shell
    validations:
      required: false
